<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Borrow a Life Demo Recorder</title>
    <style>
      body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Inter, Segoe UI, Arial, sans-serif;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="demo" width="1440" height="900"></canvas>
    <script>
      const scenes = [
        {
          image: 'screenshots/01-home-hero.png',
          duration: 9,
          title: 'Borrow a life. See your own differently.',
          subtitle: 'A public window into another person\\'s real rhythm.'
        },
        {
          image: 'screenshots/01-home-hero.png',
          duration: 10,
          title: 'Life windows in motion',
          subtitle: 'Software engineer, farmer, line cook, and street vendor.'
        },
        {
          image: 'screenshots/02-explore.png',
          duration: 13,
          title: 'Explore possible perspectives',
          subtitle: 'Browse life windows by rhythm, safety, duration, and intent.'
        },
        {
          image: 'screenshots/03-detail-berlin.png',
          duration: 14,
          title: 'Understand the rhythm before booking',
          subtitle: 'Host profile, itinerary, boundaries, and meaningful context.'
        },
        {
          image: 'screenshots/04-booking.png',
          duration: 16,
          title: 'AI Safety Engine before every request',
          subtitle: 'Analyze time, location type, mode, transport, and public exit access.'
        },
        {
          image: 'screenshots/04-booking.png',
          duration: 9,
          title: 'Boundary Contract',
          subtitle: 'Allowed behaviors, not allowed behaviors, and required safety rules.'
        },
        {
          image: 'screenshots/05-safety.png',
          duration: 7,
          title: 'Borrow perspective, not private life',
          subtitle: 'A startup MVP for safe, public, human perspective.'
        }
      ];

      const canvas = document.getElementById('demo');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;
      const FPS = 30;
      const totalDuration = scenes.reduce((sum, scene) => sum + scene.duration, 0);

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function drawCover(img, progress) {
        const baseScale = Math.max(W / img.width, H / img.height);
        const zoom = 1 + progress * 0.035;
        const scale = baseScale * zoom;
        const iw = img.width * scale;
        const ih = img.height * scale;
        const x = (W - iw) / 2;
        const y = (H - ih) / 2;
        ctx.drawImage(img, x, y, iw, ih);
      }

      function drawOverlay(scene, sceneProgress, globalTime) {
        const grad = ctx.createLinearGradient(0, H * 0.45, 0, H);
        grad.addColorStop(0, 'rgba(29,27,24,0.05)');
        grad.addColorStop(1, 'rgba(29,27,24,0.78)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = 'rgba(247,243,237,0.90)';
        roundRect(ctx, 72, 688, 780, 132, 8);
        ctx.fill();

        ctx.fillStyle = '#ff5a36';
        ctx.font = '700 18px Inter, Segoe UI, Arial';
        ctx.letterSpacing = '4px';
        ctx.fillText('BORROW A LIFE', 104, 732);

        ctx.fillStyle = '#1d1b18';
        ctx.font = '700 42px Inter, Segoe UI, Arial';
        ctx.fillText(scene.title, 104, 776);

        ctx.fillStyle = '#706a61';
        ctx.font = '400 24px Inter, Segoe UI, Arial';
        ctx.fillText(scene.subtitle, 104, 812);

        const barW = 420;
        const barX = W - barW - 72;
        const barY = 808;
        ctx.fillStyle = 'rgba(247,243,237,0.30)';
        roundRect(ctx, barX, barY, barW, 8, 4);
        ctx.fill();
        ctx.fillStyle = '#ff5a36';
        roundRect(ctx, barX, barY, barW * (globalTime / totalDuration), 8, 4);
        ctx.fill();
      }

      function chooseMimeType() {
        const candidates = [
          'video/mp4;codecs="avc1.42E01E"',
          'video/mp4',
          'video/webm;codecs=vp9',
          'video/webm'
        ];
        return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || '';
      }

      async function main() {
        const images = await Promise.all(scenes.map((scene) => loadImage(scene.image)));
        const stream = canvas.captureStream(FPS);
        const mimeType = chooseMimeType();
        const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
        const chunks = [];
        const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);

        recorder.ondataavailable = (event) => {
          if (event.data && event.data.size) chunks.push(event.data);
        };

        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: mimeType || 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `borrow-a-life-demo.${extension}`;
          document.body.appendChild(a);
          a.click();
          window.__recordingDone = { extension, mimeType, size: blob.size };
        };

        recorder.start(1000);

        const startedAt = performance.now();
        let elapsed = 0;
        let sceneStart = 0;
        let sceneIndex = 0;

        function frame(now) {
          elapsed = Math.min((now - startedAt) / 1000, totalDuration);

          while (
            sceneIndex < scenes.length - 1 &&
            elapsed > sceneStart + scenes[sceneIndex].duration
          ) {
            sceneStart += scenes[sceneIndex].duration;
            sceneIndex += 1;
          }

          const scene = scenes[sceneIndex];
          const sceneProgress = Math.min((elapsed - sceneStart) / scene.duration, 1);

          ctx.fillStyle = '#1d1b18';
          ctx.fillRect(0, 0, W, H);
          drawCover(images[sceneIndex], sceneProgress);
          drawOverlay(scene, sceneProgress, elapsed);

          if (elapsed < totalDuration) {
            requestAnimationFrame(frame);
          } else {
            recorder.stop();
          }
        }

        requestAnimationFrame(frame);
      }

      main().catch((error) => {
        window.__recordingError = String(error && error.stack ? error.stack : error);
      });
    </script>
  </body>
</html>
